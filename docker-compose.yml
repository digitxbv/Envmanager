# docker-compose.yml
# EnvManager self-host stack.
# Supabase services are vendored from the official supabase/docker compose,
# release v1.26.05 (https://github.com/supabase/supabase/releases/tag/v1.26.05).
# Image tags below MUST match that release; kong.yml / vector.yml under volumes/
# are copied verbatim from the same release.
#
# POSTGRES VERSION NOTE (Task-6 validation item):
#   This compose pins supabase/postgres:15.8.1.085 (PG15) from the upstream release.
#   Local development and CI ran on PG17. Run `docker compose up` in Task 6 to
#   confirm all 100 migrations apply cleanly on PG15. If any migration uses PG17-only
#   syntax or functions, bump the db/db-init image tag to a supabase/postgres:17.x
#   self-host image when one is available, or pin an alternative PG17-compatible image.
name: envmanager

services:
  # ---------------------------------------------------------------------------
  # Bundled Postgres (the database). Holds Vault key material — back up its volume.
  # ---------------------------------------------------------------------------
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
      # Vault/pgsodium data key for images that consume it from env.
      VAULT_ENC_KEY: ${VAULT_ENC_KEY}
    volumes:
      # Supabase DB init scripts — run ONCE on a fresh data dir. roles.sql sets
      # the internal service-role passwords from POSTGRES_PASSWORD; jwt.sql applies
      # the JWT settings; the rest create schemas required by realtime/functions.
      # Without these the auth/rest/storage services cannot authenticate to the DB.
      # Vendored from supabase/supabase v1.26.05 — MUST match the image tag above.
      - ./volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:Z
      - ./volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - ./volumes/db/pooler.sql:/docker-entrypoint-initdb.d/migrations/99-pooler.sql:Z
      # PGDATA — persisted across restarts (holds most data; back this up).
      - ./volumes/db/data:/var/lib/postgresql/data:Z
      # Persists the pgsodium/Vault root key across restarts — REQUIRED so secrets
      # stay decryptable after a restart. Back this up together with the data dir.
      - db-config:/etc/postgresql-custom
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    ports:
      # Optional direct DB access for the db-init job & operator psql.
      - "5432:5432"

  # ---------------------------------------------------------------------------
  # One-shot: apply EnvManager migrations + run self-host bootstrap, then exit.
  # Everything that needs the schema depends on this completing successfully.
  # ---------------------------------------------------------------------------
  db-init:
    image: supabase/postgres:15.8.1.085   # ships psql; reuse the same image
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Honor the external-Postgres override hook; default to the bundled db.
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres}
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./scripts/self-host-bootstrap.sql:/bootstrap/self-host-bootstrap.sql:ro
      - ./scripts/db-init-entrypoint.sh:/usr/local/bin/db-init-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/db-init-entrypoint.sh"]

  # ---------------------------------------------------------------------------
  # Kong API gateway — the single front door for auth/rest/realtime/storage/fns.
  # ---------------------------------------------------------------------------
  kong:
    image: kong/kong:3.9.1
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    # kong.yml ships with $SUPABASE_ANON_KEY-style placeholders. The entrypoint
    # substitutes them from env (and builds the realtime/auth Lua expressions)
    # into KONG_DECLARATIVE_CONFIG before starting Kong. Without it, Kong's API
    # keys are the literal placeholder strings and every gateway call 401s.
    # entrypoint + kong-entrypoint.sh vendored from supabase/supabase v1.26.05.
    entrypoint: ["bash", "/home/kong/kong-entrypoint.sh"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      # Must list every plugin referenced by volumes/api/kong.yml, or Kong fails
      # to boot. Matches supabase/supabase v1.26.05 (the source of kong.yml).
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination,ip-restriction,post-function
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      # Opaque (sb_) API keys — MUST be blank for the legacy HS256 setup so Kong
      # registers only the anon/service_role JWTs as gateway keys. (Do NOT wire
      # these to the app's SUPABASE_SECRET_KEY, which is the service-role key and
      # would create a duplicate keyauth credential — uniqueness violation.)
      SUPABASE_PUBLISHABLE_KEY: ""
      SUPABASE_SECRET_KEY: ""
      ANON_KEY_ASYMMETRIC: ""
      SERVICE_ROLE_KEY_ASYMMETRIC: ""
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro
      - ./volumes/api/kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro
    ports:
      - "8000:8000"   # http gateway (SUPABASE_PUBLIC_URL)
      - "8443:8443"   # https gateway (optional)

  # ---------------------------------------------------------------------------
  # GoTrue (auth)
  # ---------------------------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.177.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 5s
      interval: 5s
      retries: 5
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: "${NUXT_PUBLIC_SITE_URL},${NUXT_PUBLIC_SITE_URL}/auth/callback,${NUXT_PUBLIC_SITE_URL}/dashboard"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      # Optional Google OAuth. GoTrue needs a real boolean here — an empty string
      # crashes it on boot — so this is an explicit flag defaulting to false, NOT
      # derived from GOOGLE_CLIENT_ID. Set GOOGLE_OAUTH_ENABLED=true in .env only
      # when you also fill GOOGLE_CLIENT_ID/SECRET.
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback
      # Optional SMTP — without it GoTrue logs the link instead of mailing it.
      GOTRUE_SMTP_HOST: ""
      GOTRUE_SMTP_ADMIN_EMAIL: ${MAILGUN_FROM_EMAIL}

  # ---------------------------------------------------------------------------
  # PostgREST (REST API)
  # ---------------------------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    command: ["postgrest"]

  # ---------------------------------------------------------------------------
  # Realtime
  # ---------------------------------------------------------------------------
  realtime:
    # Container name parses the subdomain to derive tenant id (upstream quirk).
    container_name: realtime-dev.supabase-realtime
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sSfL --head -o /dev/null -H \"Authorization: Bearer ${ANON_KEY}\" http://localhost:4000/api/tenants/realtime-dev/health"]
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 10s
    environment:
      PORT: 4000
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"

  # ---------------------------------------------------------------------------
  # Storage + imgproxy
  # ---------------------------------------------------------------------------
  storage:
    image: supabase/storage-api:v1.19.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - ./volumes/storage:/var/lib/storage

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - ./volumes/storage:/var/lib/storage:ro

  # ---------------------------------------------------------------------------
  # postgres-meta (powers Studio)
  # ---------------------------------------------------------------------------
  meta:
    image: supabase/postgres-meta:v0.91.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # ---------------------------------------------------------------------------
  # Studio (DB admin UI — not the end-user app)
  # ---------------------------------------------------------------------------
  studio:
    image: supabase/studio:2025.06.02-sha-8f2993d
    restart: unless-stopped
    depends_on:
      meta:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/platform/profile').then((r)=>{if(r.status!==200)throw new Error(r.status)})"]
      timeout: 10s
      interval: 5s
      retries: 3
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: EnvManager
      DEFAULT_PROJECT_NAME: EnvManager
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    ports:
      - "8001:3000"   # Studio at http://localhost:8001 (operator only)

  # ---------------------------------------------------------------------------
  # Edge Runtime (Deno) — serves OUR edge functions (Stripe fns excluded).
  # ---------------------------------------------------------------------------
  functions:
    image: supabase/edge-runtime:v1.71.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      kong:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      # The edge-runtime applies ONE global JWT policy; our functions each do
      # their own auth (api-key checks, webhook-signature checks, public
      # callbacks), so verification is left to the functions. A global "true"
      # here would reject webhooks/OAuth callbacks that carry no Supabase JWT.
      VERIFY_JWT: "false"
      # App/function secrets (all OPTIONAL ones are inert when blank).
      CRON_SECRET: ${CRON_SECRET}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      MAILGUN_FROM_EMAIL: ${MAILGUN_FROM_EMAIL}
      MAILGUN_REGION: ${MAILGUN_REGION}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
    volumes:
      # Mount the public functions (incl. the `main` dispatcher). Stripe fns
      # are not in this repo. Read-only: the runtime only executes the code.
      - ./supabase/functions:/home/deno/functions:ro
      # Writable Deno module cache (remote imports are fetched on first run).
      - deno-cache:/root/.cache/deno
    # The edge-runtime boots a single "main" service that routes each request
    # (/functions/v1/<name>, prefix stripped by Kong) to /home/deno/functions/<name>.
    command: ["start", "--main-service", "/home/deno/functions/main"]

  # ---------------------------------------------------------------------------
  # The EnvManager Nuxt app.
  # ---------------------------------------------------------------------------
  app:
    # Build the app image locally from the bundled Dockerfile by default so
    # `docker compose up` works out of the box (no pre-published image needed).
    # To run a pinned PUBLISHED image instead, override `image:` and drop
    # `build:` via docker-compose.override.yml — see docs/self-hosting/install.md.
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Bakes ssr:false (SPA) — see nuxt.config.ts. Required for self-host.
        EM_SELF_HOSTED: "true"
        # Lets nuxt.config decide the cookie Secure flag from the URL scheme
        # (http trial -> not Secure so the session cookie isn't dropped).
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
    image: envmanager:local
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_started
      auth:
        condition: service_healthy
      rest:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-S", "http://localhost:3000/", "-o", "/dev/null"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    environment:
      NODE_ENV: ${NODE_ENV}
      HOST: ${HOST}
      PORT: ${PORT}
      EM_SELF_HOSTED: ${EM_SELF_HOSTED}
      NUXT_PUBLIC_APP_NAME: ${NUXT_PUBLIC_APP_NAME}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
      # SUPABASE_URL is the public, host-published gateway URL so the anon client
      # works from the user's browser. EnvManager talks to Supabase exclusively
      # client-side (all DB/auth access goes through useSupabaseClient(); auth
      # middleware skips server-side), so SSR does not make authenticated Supabase
      # calls and never needs the in-network http://kong:8000 host. If you add a
      # server-side Supabase call, give @nuxtjs/supabase a separate server URL.
      SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_KEY: ${ANON_KEY}
      # The self-hosted build is a SPA (ssr:false): the browser reads its Supabase
      # config from the public runtime payload, so these NUXT_PUBLIC_* vars are
      # what actually reach the user's browser. They must be the browser-reachable
      # gateway URL + anon key. (CSP also derives the allowed origin from these.)
      NUXT_PUBLIC_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      NUXT_PUBLIC_SUPABASE_KEY: ${ANON_KEY}
      SUPABASE_SECRET_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      # Optional integrations (inert when blank).
      NUXT_PUBLIC_GITHUB_APP_NAME: ${NUXT_PUBLIC_GITHUB_APP_NAME}
      NUXT_PUBLIC_GITHUB_CLIENT_ID: ${NUXT_PUBLIC_GITHUB_CLIENT_ID}
    ports:
      - "8080:3000"   # the app at http://localhost:8080

# Named volume for the Postgres custom config dir, which holds the pgsodium/Vault
# root key. Persisting it keeps secrets decryptable across container restarts.
volumes:
  db-config:
  # Deno module cache for the edge-functions runtime (remote import downloads).
  deno-cache:
